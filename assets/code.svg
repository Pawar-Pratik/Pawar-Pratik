<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 312" width="900" height="312" fill="none" role="img" aria-label="Sample code — Spring Boot auth controller">
  <style>
    .m{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}.n{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}.lab{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:600;letter-spacing:.14em}
    .cur{fill:#34d399;animation:blink 1.05s steps(1) infinite}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  </style>
  <rect x="0.6" y="0.6" width="898.8" height="310.8" rx="18" fill="#0f141c" stroke="#242c38" stroke-width="1.25"/>
  <rect x="16" y="1.1" width="868" height="1.1" rx="0.55" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="30" cy="32" r="4.5" fill="#ff5f56"/>
  <circle cx="47" cy="32" r="4.5" fill="#ffbd2e"/>
  <circle cx="64" cy="32" r="4.5" fill="#27c93f"/>
  <text x="90" y="36" class="m" font-size="12" fill="#6b7481">AuthController.java</text>
  <text x="870" y="36" class="lab" font-size="10.5" text-anchor="end" fill="#34d399">SPRING&#160;BOOT</text>
  <line x1="0" y1="56" x2="900" y2="56" stroke="#212936" stroke-width="1"/>
  <text x="42" y="88" class="n" font-size="12" text-anchor="end" fill="#6b7481">1</text>
  <text x="66" y="88" class="m" font-size="15" xml:space="preserve"><tspan fill="#e3b341">@RestController</tspan></text>
  <text x="42" y="110" class="n" font-size="12" text-anchor="end" fill="#6b7481">2</text>
  <text x="66" y="110" class="m" font-size="15" xml:space="preserve"><tspan fill="#e3b341">@RequestMapping</tspan><tspan fill="#9aa4b0">(</tspan><tspan fill="#a5d6ff">"/api/v1/auth"</tspan><tspan fill="#9aa4b0">)</tspan></text>
  <text x="42" y="132" class="n" font-size="12" text-anchor="end" fill="#6b7481">3</text>
  <text x="66" y="132" class="m" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">class </tspan><tspan fill="#79c0ff">AuthController</tspan><tspan fill="#9aa4b0"> {</tspan></text>
  <text x="42" y="154" class="n" font-size="12" text-anchor="end" fill="#6b7481">4</text>
  <text x="42" y="176" class="n" font-size="12" text-anchor="end" fill="#6b7481">5</text>
  <text x="66" y="176" class="m" font-size="15" xml:space="preserve"><tspan fill="#e3b341">  @PostMapping</tspan><tspan fill="#9aa4b0">(</tspan><tspan fill="#a5d6ff">"/token"</tspan><tspan fill="#9aa4b0">)</tspan></text>
  <text x="42" y="198" class="n" font-size="12" text-anchor="end" fill="#6b7481">6</text>
  <text x="66" y="198" class="m" font-size="15" xml:space="preserve"><tspan fill="#79c0ff">  Token</tspan><tspan fill="#d2a8ff"> issue</tspan><tspan fill="#9aa4b0">(</tspan><tspan fill="#e3b341">@Valid </tspan><tspan fill="#79c0ff">LoginRequest</tspan><tspan fill="#e9edf3"> req</tspan><tspan fill="#9aa4b0">) {</tspan></text>
  <text x="42" y="220" class="n" font-size="12" text-anchor="end" fill="#6b7481">7</text>
  <text x="66" y="220" class="m" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">    return </tspan><tspan fill="#e9edf3">authService</tspan><tspan fill="#9aa4b0">.</tspan><tspan fill="#d2a8ff">authenticate</tspan><tspan fill="#9aa4b0">(req)</tspan><tspan fill="#9aa4b0">     </tspan><tspan fill="#7d8590">// OAuth2 · JWT</tspan></text>
  <text x="42" y="242" class="n" font-size="12" text-anchor="end" fill="#6b7481">8</text>
  <text x="66" y="242" class="m" font-size="15" xml:space="preserve"><tspan fill="#9aa4b0">        .</tspan><tspan fill="#d2a8ff">map</tspan><tspan fill="#9aa4b0">(</tspan><tspan fill="#79c0ff">Token::of</tspan><tspan fill="#9aa4b0">)</tspan><tspan fill="#9aa4b0">;</tspan></text>
  <text x="42" y="264" class="n" font-size="12" text-anchor="end" fill="#6b7481">9</text>
  <text x="66" y="264" class="m" font-size="15" xml:space="preserve"><tspan fill="#9aa4b0">  }</tspan></text>
  <text x="42" y="286" class="n" font-size="12" text-anchor="end" fill="#6b7481">10</text>
  <text x="66" y="286" class="m" font-size="15" xml:space="preserve"><tspan fill="#9aa4b0">}</tspan></text>
  <rect class="cur" x="80" y="274" width="8" height="15" rx="1"/>
</svg>
