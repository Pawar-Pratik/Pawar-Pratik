<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" fill="none" role="img" aria-label="Pratik Pawar - Java Backend Engineer">  <defs>
    <linearGradient id="cardg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0e1219"/><stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
  </defs>
  <style>
    .k{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:600;letter-spacing:.22em}
    .s{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Ubuntu,Helvetica,Arial,sans-serif}
    .m{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:600}
    .pulse{animation:pulse 2.4s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
    .bar{transform-box:fill-box;transform-origin:left center;animation:grow 1.1s cubic-bezier(.2,.7,.2,1) both}
    .p0{animation:ph0 13s steps(30) infinite}
    .p1{animation:ph1 13s steps(34) infinite}
    .p2{animation:ph2 13s steps(34) infinite}
    .p3{animation:ph3 13s steps(28) infinite}
    .l1,.l2,.l3{opacity:0}
    .cur{fill:#34d399;animation:blink 1.05s steps(1) infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes grow{from{transform:scaleX(.001)}to{transform:scaleX(1)}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes ph0{0%{opacity:1;clip-path:inset(0 100% 0 0)}7%{opacity:1;clip-path:inset(0 0 0 0)}25%{opacity:1;clip-path:inset(0 0 0 0)}26%{opacity:0;clip-path:inset(0 100% 0 0)}99.9%{opacity:0;clip-path:inset(0 100% 0 0)}100%{opacity:1;clip-path:inset(0 100% 0 0)}}
    @keyframes ph1{0%{opacity:0;clip-path:inset(0 100% 0 0)}24.9%{opacity:0;clip-path:inset(0 100% 0 0)}26%{opacity:1;clip-path:inset(0 100% 0 0)}33%{opacity:1;clip-path:inset(0 0 0 0)}50%{opacity:1;clip-path:inset(0 0 0 0)}51%{opacity:0;clip-path:inset(0 100% 0 0)}100%{opacity:0;clip-path:inset(0 100% 0 0)}}
    @keyframes ph2{0%{opacity:0;clip-path:inset(0 100% 0 0)}49.9%{opacity:0;clip-path:inset(0 100% 0 0)}51%{opacity:1;clip-path:inset(0 100% 0 0)}58%{opacity:1;clip-path:inset(0 0 0 0)}75%{opacity:1;clip-path:inset(0 0 0 0)}76%{opacity:0;clip-path:inset(0 100% 0 0)}100%{opacity:0;clip-path:inset(0 100% 0 0)}}
    @keyframes ph3{0%{opacity:0;clip-path:inset(0 100% 0 0)}74.9%{opacity:0;clip-path:inset(0 100% 0 0)}76%{opacity:1;clip-path:inset(0 100% 0 0)}83%{opacity:1;clip-path:inset(0 0 0 0)}99%{opacity:1;clip-path:inset(0 0 0 0)}100%{opacity:0;clip-path:inset(0 100% 0 0)}}
  </style>
  <rect x="0.6" y="0.6" width="898.8" height="298.8" rx="20" fill="url(#cardg)" stroke="#20252f" stroke-width="1.25"/>
  <rect x="16" y="1" width="868" height="1.2" rx="0.6" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="770" cy="30" r="240" fill="url(#glow)"/>
  <rect x="0.6" y="0.6" width="898.8" height="298.8" rx="20" fill="url(#dots)"/>
  <rect x="40" y="40" width="9" height="9" rx="2.5" fill="url(#acc)"/>
  <text x="60" y="48" class="k" font-size="12" fill="#9aa2ad">SOFTWARE ENGINEER</text>
  <rect x="728" y="34" width="132" height="24" rx="12" fill="#0f141c" stroke="#20252f" stroke-width="1"/>
  <circle class="pulse" cx="744" cy="46" r="4" fill="#34d399"/>
  <text x="756" y="50" class="m" font-size="12" fill="#9aa2ad">Pune, India</text>
  <text x="40" y="150" class="s" font-size="60" font-weight="800" fill="#e7e9ee">Pratik Pawar</text>
  <rect class="bar" x="42" y="168" width="78" height="5" rx="2.5" fill="url(#acc)"/>
  <text x="42" y="206" class="s" font-size="18" font-weight="500" fill="#9aa2ad">Enterprise software  <tspan fill="#34d399">&#183;</tspan>  Distributed systems  <tspan fill="#34d399">&#183;</tspan>  System design</text>
  <text x="42" y="254" class="m" font-size="19" fill="#34d399">&#8250;</text>
  <text x="66" y="254" class="m p0" font-size="19" fill="#c5ccd6">Designing secure authentication platforms<tspan class="cur" dx="3">&#9612;</tspan></text>
  <text x="66" y="254" class="m p1" font-size="19" fill="#c5ccd6">Building scalable backend services<tspan class="cur" dx="3">&#9612;</tspan></text>
  <text x="66" y="254" class="m p2" font-size="19" fill="#c5ccd6">Exploring distributed systems at scale<tspan class="cur" dx="3">&#9612;</tspan></text>
  <text x="66" y="254" class="m p3" font-size="19" fill="#c5ccd6">Always shipping. Always learning.<tspan class="cur" dx="3">&#9612;</tspan></text>
</svg>
