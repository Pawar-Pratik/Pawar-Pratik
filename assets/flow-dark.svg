  <circle class="" cx="580" cy="229" r="4" fill="#dc382d"/>
  <text x="592" y="233" class="t" font-size="13" fill="#e9edf3">REDIS</text>
  <text x="580" y="251" class="sub" font-size="10" fill="#6b7481">cache · sessions</text>
  <text x="36" y="250" class="sub" font-size="11.5" fill="#6b7481"><tspan fill="#34d399">//</tspan> stateless services · JWT sessions cached in Redis · Postgres as source of truth</text>
