<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 288" width="900" height="288" fill="none" role="img" aria-label="Request lifecycle - system architecture">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#34d399" stop-opacity="0.16"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/></radialGradient>
  </defs>
  <style>
    .k{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:600;letter-spacing:.2em}
    .t{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:700}
    .sub{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:500}
    .flowdot{animation:none}
    .halo{animation:none}
    .apulse{animation:apulse 2s ease-in-out infinite}
    @keyframes apulse{0%,100%{opacity:.55}50%{opacity:1}}
  </style>
