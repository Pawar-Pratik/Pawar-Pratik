  <g><circle r="7" fill="#38bdf8" opacity="0.18"/><circle r="3" fill="#38bdf8"/><animateMotion dur="2.4s" begin="0.6s" repeatCount="indefinite" path="M630.0 154 L630.0 208 L630.0 154" calcMode="linear"/></g>
  <rect x="24" y="96" width="132" height="58" rx="11" fill="#141a24" stroke="#242c38" stroke-width="1.25"/>
  <circle class="" cx="40" cy="117" r="4" fill="#38bdf8"/>
  <text x="52" y="121" class="t" font-size="13" fill="#e9edf3">CLIENT</text>
