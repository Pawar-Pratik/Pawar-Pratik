  <circle class="" cx="760" cy="117" r="4" fill="#3b82f6"/>
  <text x="772" y="121" class="t" font-size="13" fill="#e9edf3">POSTGRES</text>
  <text x="760" y="139" class="sub" font-size="10" fill="#6b7481">persistence</text>
